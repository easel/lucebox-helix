; Project Vale configuration — direct Vale runs only.
; sloptimizer/scripts/slop-audit.sh generates its own temp config and does
; not read this file.
;
; Em dashes are house style in HELIX artifacts (parenthetical and list-item
; punctuation). SloptimizerStrict.EmDash fires on every instance — accepted
; and suppressed here.

StylesPath = .vale/styles
MinAlertLevel = warning

[*.md]
; Em dash is intentional punctuation in this project. Suppress the strict rule.
SloptimizerStrict.EmDash = NO
